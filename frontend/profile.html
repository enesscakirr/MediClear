<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - MediClear</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
            background: linear-gradient(135deg, rgba(144, 224, 239, 0.1) 0%, rgba(0, 119, 182, 0.05) 100%);
        }

        .profile-card {
            background: var(--white);
            padding: var(--space-xl);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            text-align: center;
            margin-bottom: var(--space-lg);
        }

        .profile-header h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: var(--space-sm);
        }

        .form-group {
            margin-bottom: var(--space-md);
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color var(--transition-speed);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        #messageBox {
            text-align: center;
            margin-bottom: var(--space-md);
            display: none;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: var(--radius-md);
        }

        .msg-success {
            color: #2a9d8f;
            background: rgba(42, 157, 143, 0.1);
        }

        .msg-error {
            color: var(--danger);
            background: rgba(231, 111, 81, 0.1);
        }
    </style>
</head>

<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-heart-pulse"></i> Medi<span>Clear</span></a>
            <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Ana Sayfa</a></li>
                    <li><a href="glossary.html">Terimler Sözlüğü</a></li>
                    <li><a href="hospitals.html">Yakınımdaki Hastaneler</a></li>
                    <li><a href="blog.html">Sağlıklı Yaşam</a></li>
                    <li><a href="analyst.html" class="btn btn-primary">AI Analist</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <h2>Profil Bilgilerim</h2>
                <p>Kişisel bilgilerinizi görüntüleyin ve güncelleyin</p>
            </div>

            <div id="messageBox"></div>

            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Ad Soyad</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <!-- Şifre güncellemesi opsiyonel olduğu için required değil -->
                <div class="form-group">
                    <label for="password">Yeni Şifre (Değiştirmek istemiyorsanız boş bırakın)</label>
                    <input type="password" id="password" class="form-control" placeholder="******">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-save"></i> Değişiklikleri Kaydet
                </button>
            </form>
        </div>
    </div>

    <!-- Alt Kısım -->
    <footer>
        <div class="container" style="text-align: center; padding: 2rem 0; color: var(--text-light);">
            &copy; 2024 MediClear. Tüm hakları saklıdır.
        </div>
    </footer>

    <script src="auth.js"></script>
    <script src="script.js"></script>

    <script>
        // Sayfa açıldığında mevcut profil bilgilerini doldur
        document.addEventListener('DOMContentLoaded', async () => {
            // Eğer giriş yapmamışsa, checkAuth() (auth.js içinde) zaten login'e atar.
            // Sadece ekstra güvenlik ve profil yükleme işlemi yapalım.
            if (auth.isLoggedIn()) {
                try {
                    const profile = await auth.getProfile();
                    document.getElementById('name').value = profile.name;
                    document.getElementById('email').value = profile.email;
                } catch (error) {
                    const msgBox = document.getElementById('messageBox');
                    msgBox.textContent = error.message;
                    msgBox.className = 'msg-error';
                    msgBox.style.display = 'block';
                }
            }
        });

        // Form gönderildiğinde (Güncelleme)
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const msgBox = document.getElementById('messageBox');

            // Eğer şifre yazılmadıysa hiç göndermeyelim
            const updateData = { name, email };
            if (password.trim() !== '') {
                updateData.password = password;
            }

            try {
                await auth.updateProfile(updateData);

                msgBox.innerHTML = '<i class="fa-solid fa-check-circle"></i> Profil başarıyla güncellendi!';
                msgBox.className = 'msg-success';
                msgBox.style.display = 'block';

                // Şifre kutusunu temizle
                document.getElementById('password').value = '';

                // Navbar'daki ismi hemen güncelle (Sayfayı yenilemeye gerek kalmadan)
                updateNavbarAuth();

            } catch (error) {
                msgBox.textContent = error.message;
                msgBox.className = 'msg-error';
                msgBox.style.display = 'block';
            }
        });
    </script>
</body>

</html>
