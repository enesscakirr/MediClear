# ============================================================
# docker-compose.yml — MediClear Microservices Orchestration
# To start the entire system: docker-compose up --build
# ============================================================

services:

  # ─────────────────────────────────────────────────────────────
  # 1. DATABASE: MongoDB
  # ─────────────────────────────────────────────────────────────
  db:
    image: mongo:7.0
    container_name: mediclear-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      # Optional authentication (disabled for now)
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: supersecret
      MONGO_INITDB_DATABASE: MediClear
    networks:
      - mediclear-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────
  # 2. BACKEND: Node.js / Express
  # ─────────────────────────────────────────────────────────────
  backend-node:
    build:
      context: ../backend-node
      dockerfile: ../deploy/Dockerfile.backend
    container_name: mediclear-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # server.js uses path.join(__dirname, '../frontend') → /frontend
      - ../frontend:/frontend:ro
    environment:
      PORT: 5000
      NODE_ENV: production
      # Access service by name in Docker network ('db' instead of localhost)
      MONGODB_URI: ${MONGODB_URI:-mongodb://db:27017/MediClear}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # Python AI Service address (by container name)
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
    networks:
      - mediclear-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # 3. AI SERVICE: Python / FastAPI / LangGraph
  # ─────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ../ai-service
      dockerfile: ../deploy/Dockerfile.ai
    container_name: mediclear-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Read all values from .env file
    env_file:
      - ../.env
    environment:
      # Ollama runs OUTSIDE the container — reach the host machine's IP
      # Linux/Mac: works with host.docker.internal or host-gateway
      # Windows Docker Desktop: host.docker.internal is automatically defined
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      VISION_MODEL: ${VISION_MODEL:-llava:7b}
      TRANSLATOR_MODEL: ${TRANSLATOR_MODEL:-translategemma:latest}
      MEDICAL_MODEL: ${MEDICAL_MODEL:-Goosedev/medbot:latest}
    # To reach host network on Linux (optional):
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mediclear-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

# ─────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    name: mediclear_mongo_data

# ─────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────
networks:
  mediclear-net:
    name: mediclear-network
    driver: bridge